<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RemotionOne - Article to Video</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    .glow { box-shadow: 0 0 30px rgba(99,102,241,0.15); }
    pre { white-space: pre-wrap; word-break: break-all; }
    @keyframes pulse-dot { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
    .dot-1 { animation: pulse-dot 1.4s infinite; }
    .dot-2 { animation: pulse-dot 1.4s infinite 0.2s; }
    .dot-3 { animation: pulse-dot 1.4s infinite 0.4s; }
  </style>
</head>
<body class="gradient-bg min-h-screen text-gray-100">

<div x-data="app()" x-init="init()" x-cloak class="max-w-6xl mx-auto px-4 py-8">

  <!-- Header -->
  <header class="text-center mb-10">
    <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
      RemotionOne
    </h1>
    <p class="text-gray-400 mt-2">Article to Explainer Video</p>
  </header>

  <!-- Tabs -->
  <nav class="flex gap-1 mb-8 glass rounded-xl p-1 w-fit mx-auto">
    <button @click="tab='create'" :class="tab==='create' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:text-white'"
      class="px-5 py-2 rounded-lg text-sm font-medium transition-all">New Video</button>
    <button @click="tab='sessions'; loadSessions()" :class="tab==='sessions' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:text-white'"
      class="px-5 py-2 rounded-lg text-sm font-medium transition-all">Sessions</button>
    <button @click="tab='detail'" x-show="currentSession" :class="tab==='detail' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:text-white'"
      class="px-5 py-2 rounded-lg text-sm font-medium transition-all">Detail</button>
  </nav>

  <!-- Create Tab -->
  <div x-show="tab==='create'" class="glass rounded-2xl p-8 glow">
    <h2 class="text-xl font-semibold mb-6">Create Video from Article</h2>
    <div class="space-y-5">
      <div>
        <label class="block text-sm text-gray-400 mb-1.5">Article Content</label>
        <textarea x-model="form.article" rows="10" placeholder="Paste your article here..."
          class="w-full bg-gray-900/60 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 resize-y"></textarea>
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1.5">Requirements (optional)</label>
        <textarea x-model="form.requirements" rows="3" placeholder="e.g. target audience, tone, length..."
          class="w-full bg-gray-900/60 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 resize-y"></textarea>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1.5">Width</label>
          <input x-model.number="form.video_width" type="number" placeholder="1920"
            class="w-full bg-gray-900/60 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1.5">Height</label>
          <input x-model.number="form.video_height" type="number" placeholder="1080"
            class="w-full bg-gray-900/60 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1.5">FPS</label>
          <input x-model.number="form.video_fps" type="number" placeholder="30"
            class="w-full bg-gray-900/60 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1.5">Voice</label>
          <select x-model="form.tts_voice"
            class="w-full bg-gray-900/60 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
            <option value="yunxi">Yunxi (Male)</option>
            <option value="xiaoxiao">Xiaoxiao (Female)</option>
            <option value="yunyang">Yunyang (News)</option>
            <option value="xiaoyi">Xiaoyi (Young)</option>
          </select>
        </div>
      </div>
      <button @click="submitArticle()" :disabled="submitting || !form.article.trim()"
        class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 disabled:cursor-not-allowed rounded-xl font-medium transition-all">
        <span x-show="!submitting">Generate Video</span>
        <span x-show="submitting" class="flex items-center justify-center gap-1">
          Processing<span class="dot-1">.</span><span class="dot-2">.</span><span class="dot-3">.</span>
        </span>
      </button>
    </div>
  </div>

  <!-- Sessions Tab -->
  <div x-show="tab==='sessions'" class="glass rounded-2xl p-8 glow">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-semibold">Sessions</h2>
      <button @click="loadSessions()" class="text-sm text-indigo-400 hover:text-indigo-300">Refresh</button>
    </div>
    <div x-show="sessions.length === 0" class="text-center text-gray-500 py-12">No sessions yet</div>
    <div class="space-y-3">
      <template x-for="s in sessions" :key="s.session_id">
        <div @click="viewSession(s.session_id)"
          class="flex items-center gap-4 p-4 bg-gray-900/40 rounded-xl cursor-pointer hover:bg-gray-900/70 transition-all">
          <div class="flex-shrink-0">
            <span :class="{
              'bg-green-500/20 text-green-400': s.status==='completed',
              'bg-red-500/20 text-red-400': s.status==='error',
              'bg-indigo-500/20 text-indigo-400': !['completed','error'].includes(s.status)
            }" class="px-2.5 py-1 rounded-full text-xs font-medium" x-text="s.status"></span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-mono text-gray-300" x-text="s.session_id"></div>
            <div class="text-xs text-gray-500 mt-0.5" x-text="s.current_step || 'Created'"></div>
          </div>
          <div class="flex-shrink-0 w-24">
            <div class="h-1.5 bg-gray-700 rounded-full overflow-hidden">
              <div class="h-full bg-indigo-500 rounded-full transition-all" :style="`width:${s.progress}%`"></div>
            </div>
            <div class="text-xs text-gray-500 text-right mt-1" x-text="s.progress + '%'"></div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Detail Tab -->
  <div x-show="tab==='detail' && currentSession" class="space-y-6">
    <!-- Progress Card -->
    <div class="glass rounded-2xl p-8 glow">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold">Session <span class="font-mono text-indigo-400" x-text="currentSession?.session_id"></span></h2>
        <span :class="{
          'bg-green-500/20 text-green-400': currentSession?.status==='completed',
          'bg-red-500/20 text-red-400': currentSession?.status==='error',
          'bg-indigo-500/20 text-indigo-400': !['completed','error'].includes(currentSession?.status)
        }" class="px-3 py-1 rounded-full text-sm font-medium" x-text="currentSession?.status"></span>
      </div>
      <div class="mb-3 text-sm text-gray-400" x-text="currentSession?.current_step"></div>
      <div class="h-2 bg-gray-700 rounded-full overflow-hidden mb-2">
        <div class="h-full bg-gradient-to-r from-indigo-500 to-cyan-400 rounded-full transition-all duration-500"
          :style="`width:${currentSession?.progress || 0}%`"></div>
      </div>
      <div class="text-right text-sm text-gray-500" x-text="(currentSession?.progress || 0) + '%'"></div>

      <!-- Error -->
      <div x-show="currentSession?.error" class="mt-4 p-3 bg-red-900/30 border border-red-800/50 rounded-lg text-sm text-red-300" x-text="currentSession?.error"></div>
    </div>

    <!-- Artifacts -->
    <div x-show="currentSession?.status==='completed'" class="glass rounded-2xl p-8 glow">
      <h3 class="text-lg font-semibold mb-4">Artifacts</h3>
      <div class="flex flex-wrap gap-3">
        <a :href="`/api/sessions/${currentSession?.session_id}/video`"
          class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          Video
        </a>
        <a :href="`/api/sessions/${currentSession?.session_id}/subtitles`"
          class="inline-flex items-center gap-2 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Subtitles
        </a>
        <a :href="`/api/sessions/${currentSession?.session_id}/project`"
          class="inline-flex items-center gap-2 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Project ZIP
        </a>
      </div>

      <!-- Video Player -->
      <div x-show="currentSession?.artifacts?.video" class="mt-6">
        <video controls class="w-full rounded-xl border border-gray-700"
          :src="`/api/sessions/${currentSession?.session_id}/video`"></video>
      </div>
    </div>

    <!-- Resume -->
    <div x-show="currentSession?.status==='completed' || currentSession?.status==='error'" class="glass rounded-2xl p-8 glow">
      <h3 class="text-lg font-semibold mb-4">Modify Video</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1.5">Modification Instructions</label>
          <textarea x-model="resumePrompt" rows="4" placeholder="Describe what you want to change..."
            class="w-full bg-gray-900/60 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 resize-y"></textarea>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1.5">Reference Images (optional)</label>
          <input type="file" accept="image/*" multiple @change="handleImages($event)"
            class="w-full bg-gray-900/60 border border-gray-700 rounded-xl px-4 py-3 text-sm file:mr-3 file:bg-indigo-600 file:text-white file:border-0 file:rounded-lg file:px-3 file:py-1 file:text-sm file:cursor-pointer">
          <div x-show="resumeImages.length" class="text-xs text-gray-500 mt-1" x-text="resumeImages.length + ' image(s) selected'"></div>
        </div>
        <button @click="resumeSession()" :disabled="submitting || !resumePrompt.trim()"
          class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 disabled:cursor-not-allowed rounded-xl font-medium transition-all">
          Apply Changes
        </button>
      </div>
    </div>

    <!-- Logs -->
    <div class="glass rounded-2xl p-8">
      <h3 class="text-lg font-semibold mb-4">Logs</h3>
      <div class="bg-gray-900/60 rounded-xl p-4 max-h-80 overflow-y-auto font-mono text-xs text-gray-400 space-y-0.5">
        <template x-for="(log, i) in (currentSession?.logs || [])" :key="i">
          <div x-text="log"></div>
        </template>
        <div x-show="!currentSession?.logs?.length" class="text-gray-600">No logs yet</div>
      </div>
    </div>
  </div>
</div>

<script>
function app() {
  return {
    tab: 'create',
    form: { article: '', requirements: '', video_width: 1920, video_height: 1080, video_fps: 30, tts_voice: 'yunxi' },
    sessions: [],
    currentSession: null,
    submitting: false,
    resumePrompt: '',
    resumeImages: [],
    pollTimer: null,

    init() {
      this.loadSessions();
    },

    async loadSessions() {
      try {
        const r = await fetch('/api/sessions');
        this.sessions = await r.json();
      } catch(e) { console.error(e); }
    },

    async submitArticle() {
      this.submitting = true;
      try {
        const payload = {};
        for (const [k, v] of Object.entries(this.form)) {
          if (v !== '' && v !== null) payload[k] = v;
        }
        const r = await fetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await r.json();
        if (r.ok) {
          this.tab = 'detail';
          this.viewSession(data.session_id);
        } else {
          alert(data.detail || 'Error submitting');
        }
      } catch(e) { alert(e.message); }
      finally { this.submitting = false; }
    },

    async viewSession(id) {
      this.tab = 'detail';
      await this.refreshSession(id);
      this.startPolling(id);
    },

    async refreshSession(id) {
      try {
        const r = await fetch(`/api/sessions/${id}`);
        this.currentSession = await r.json();
      } catch(e) { console.error(e); }
    },

    startPolling(id) {
      this.stopPolling();
      this.pollTimer = setInterval(async () => {
        await this.refreshSession(id);
        if (['completed', 'error'].includes(this.currentSession?.status)) {
          this.stopPolling();
        }
      }, 3000);
    },

    stopPolling() {
      if (this.pollTimer) { clearInterval(this.pollTimer); this.pollTimer = null; }
    },

    handleImages(e) {
      this.resumeImages = [];
      const files = e.target.files;
      for (const file of files) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const b64 = ev.target.result.split(',')[1];
          this.resumeImages.push(b64);
        };
        reader.readAsDataURL(file);
      }
    },

    async resumeSession() {
      if (!this.currentSession) return;
      this.submitting = true;
      try {
        const r = await fetch(`/api/sessions/${this.currentSession.session_id}/resume`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: this.resumePrompt, images: this.resumeImages }),
        });
        const data = await r.json();
        if (r.ok) {
          this.resumePrompt = '';
          this.resumeImages = [];
          this.startPolling(this.currentSession.session_id);
        } else {
          alert(data.detail || 'Error');
        }
      } catch(e) { alert(e.message); }
      finally { this.submitting = false; }
    },
  };
}
</script>
</body>
</html>

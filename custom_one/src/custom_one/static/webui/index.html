<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom One - Article to Video</title>
<style>
:root {
  --bg-primary: #0f0f23;
  --bg-secondary: #1a1a2e;
  --bg-card: #16213e;
  --bg-hover: #1e2a4a;
  --accent: #00d4ff;
  --accent-dim: #0a6e83;
  --danger: #ff4757;
  --warning: #ffa502;
  --success: #2ed573;
  --text-primary: #e8e8f0;
  --text-secondary: #8888a8;
  --text-dim: #555577;
  --border: #2a2a4a;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 340px;
  min-width: 340px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header h1 {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.btn {
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-primary {
  background: var(--accent);
  color: #000;
}
.btn-primary:hover { background: #33ddff; }

.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid var(--danger);
}
.btn-danger:hover { background: var(--danger); color: #fff; }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  padding: 6px 8px;
}
.btn-ghost:hover { color: var(--text-primary); background: var(--bg-hover); }

.btn-sm { padding: 4px 8px; font-size: 12px; }

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.session-card {
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  margin-bottom: 4px;
}
.session-card:hover { background: var(--bg-hover); }
.session-card.active { background: var(--bg-card); border-left: 3px solid var(--accent); }

.session-card-title {
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.session-card-meta {
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.session-card-actions {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  display: none;
  gap: 4px;
}
.session-card:hover .session-card-actions { display: flex; }

.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
}
.status-CREATED { background: var(--text-dim); color: var(--text-primary); }
.status-GENERATING_SCRIPT,
.status-GENERATING_TTS,
.status-GENERATING_ANIMATION { background: var(--accent-dim); color: var(--accent); }
.status-RENDERING { background: #553300; color: var(--warning); }
.status-COMPLETED { background: #1a4d2e; color: var(--success); }
.status-ERROR { background: #4d1a1a; color: var(--danger); }
.status-STOPPED { background: #333; color: #999; }

/* Main content */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.main-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 16px;
}

/* Create form */
.create-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}
.create-overlay.hidden { display: none; }

.create-modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 680px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 32px;
  box-shadow: var(--shadow);
}

.create-modal h2 {
  font-size: 20px;
  margin-bottom: 24px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 8px;
  color: var(--text-secondary);
}

textarea, input[type="text"] {
  width: 100%;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 12px;
  font-size: 14px;
  font-family: inherit;
  resize: vertical;
  transition: border-color 0.2s;
}
textarea:focus, input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
}

.form-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

/* Session detail */
.detail-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.detail-header h2 {
  font-size: 18px;
  font-weight: 600;
}

.detail-actions { display: flex; gap: 8px; }

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* Progress stepper */
.stepper {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 24px;
}

.step {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
}
.step.active { background: var(--bg-hover); border: 1px solid var(--accent-dim); }
.step.done { opacity: 0.7; }

.step-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.step-icon.pending { background: var(--text-dim); }
.step-icon.active { background: var(--accent); color: #000; animation: pulse 1.5s infinite; }
.step-icon.done { background: var(--success); color: #000; }
.step-icon.error { background: var(--danger); color: #fff; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.step-label { font-size: 14px; font-weight: 500; }
.step-message { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.tab {
  padding: 10px 20px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* Preview */
.preview-container {
  background: #000;
  border-radius: var(--radius-sm);
  overflow: hidden;
  position: relative;
}

.preview-container iframe {
  width: 100%;
  aspect-ratio: 16/9;
  border: none;
}

.preview-controls {
  padding: 12px;
  background: var(--bg-card);
  display: flex;
  align-items: center;
  gap: 12px;
}

.frame-scrubber {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  outline: none;
}
.frame-scrubber::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

.frame-label { font-size: 12px; color: var(--text-secondary); min-width: 80px; }

/* Resume form */
.resume-section {
  margin-top: 20px;
  padding: 20px;
  background: var(--bg-card);
  border-radius: var(--radius);
}

.resume-section h3 {
  font-size: 16px;
  margin-bottom: 12px;
}

/* Error display */
.error-box {
  padding: 16px;
  background: #2d1111;
  border: 1px solid var(--danger);
  border-radius: var(--radius-sm);
  color: var(--danger);
  font-size: 14px;
  margin-top: 16px;
  white-space: pre-wrap;
  word-break: break-all;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<div id="app" class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Custom One</h1>
      <button class="btn btn-primary btn-sm" onclick="showCreateModal()">+ New</button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </div>

  <!-- Main -->
  <div class="main" id="mainContent">
    <div class="main-empty">Select a session or create a new one</div>
  </div>
</div>

<!-- Create Modal -->
<div class="create-overlay hidden" id="createModal">
  <div class="create-modal">
    <h2>Create New Video</h2>
    <div class="form-group">
      <label>Article Content</label>
      <textarea id="articleInput" rows="12" placeholder="Paste your article here..."></textarea>
    </div>
    <div class="form-group">
      <label>Requirements (optional)</label>
      <input type="text" id="requirementsInput" placeholder="e.g., 60-second video, tech audience" />
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="hideCreateModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createSession()">Generate Video</button>
    </div>
  </div>
</div>

<script>
const API = '/api';
let sessions = [];
let activeSessionId = null;
let pollTimer = null;
let eventSource = null;
let previewPlaying = false;
let previewRafId = null;

// ─── Session List ───

async function fetchSessions() {
  try {
    const res = await fetch(`${API}/sessions`);
    sessions = await res.json();
    renderSessionList();
  } catch (e) {
    console.error('Failed to fetch sessions:', e);
  }
}

function renderSessionList() {
  const el = document.getElementById('sessionList');
  if (!sessions.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim)">No sessions yet</div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-card ${s.id === activeSessionId ? 'active' : ''}" onclick="selectSession('${s.id}')">
      <div class="session-card-title">${esc(s.article_title || 'Untitled')}</div>
      <div class="session-card-meta">
        <span class="status-badge status-${s.status}">${formatStatus(s.status)}</span>
        <span>${timeAgo(s.created_at)}</span>
      </div>
      <div class="session-card-actions">
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();stopSession('${s.id}')" title="Stop">⏹</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="event.stopPropagation();deleteSession('${s.id}')" title="Delete">✕</button>
      </div>
    </div>
  `).join('');
}

// ─── Session Detail ───

async function selectSession(id) {
  activeSessionId = id;
  renderSessionList();
  await loadSessionDetail(id);
  startSSE(id);
}

async function loadSessionDetail(id) {
  try {
    const res = await fetch(`${API}/sessions/${id}`);
    const detail = await res.json();
    renderDetail(detail);
  } catch (e) {
    console.error('Failed to load session:', e);
  }
}

function renderDetail(d) {
  const main = document.getElementById('mainContent');

  const stages = [
    { key: 'GENERATING_SCRIPT', label: 'Generate Script' },
    { key: 'GENERATING_TTS', label: 'Generate TTS Audio' },
    { key: 'GENERATING_ANIMATION', label: 'Generate Animation' },
    { key: 'RENDERING', label: 'Render Video' },
    { key: 'COMPLETED', label: 'Complete' },
  ];

  const stageOrder = stages.map(s => s.key);
  const currentIdx = stageOrder.indexOf(d.status);

  const stepperHtml = stages.map((s, i) => {
    let iconClass = 'pending';
    let icon = i + 1;
    if (d.status === 'ERROR' && i === currentIdx) { iconClass = 'error'; icon = '!'; }
    else if (d.status === 'COMPLETED' || i < currentIdx) { iconClass = 'done'; icon = '✓'; }
    else if (i === currentIdx) { iconClass = 'active'; icon = '⟳'; }

    const msg = (i === currentIdx) ? d.progress?.message || '' : '';
    return `
      <div class="step ${i === currentIdx ? 'active' : ''} ${i < currentIdx ? 'done' : ''}">
        <div class="step-icon ${iconClass}">${icon}</div>
        <div>
          <div class="step-label">${s.label}</div>
          ${msg ? `<div class="step-message">${esc(msg)}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  const canResume = ['COMPLETED', 'ERROR', 'STOPPED'].includes(d.status);
  const hasVideo = d.has_video;

  main.innerHTML = `
    <div class="detail-header">
      <h2>${esc(d.article_title || 'Untitled')}</h2>
      <div class="detail-actions">
        ${hasVideo ? `<button class="btn btn-primary btn-sm" onclick="downloadVideo('${d.id}')">Download MP4</button>` : ''}
        ${canResume ? `<button class="btn btn-ghost btn-sm" onclick="showResumeForm()">Resume & Modify</button>` : ''}
      </div>
    </div>
    <div class="detail-body">
      <div class="stepper">${stepperHtml}</div>

      ${d.error ? `<div class="error-box">${esc(d.error)}</div>` : ''}

      <div class="tabs">
        <div class="tab active" onclick="switchTab(this, 'tabInfo')">Info</div>
        <div class="tab" onclick="switchTab(this, 'tabPreview')">Preview</div>
        ${canResume ? '<div class="tab" onclick="switchTab(this, \'tabResume\')">Resume</div>' : ''}
      </div>

      <div class="tab-content active" id="tabInfo">
        <div style="font-size:13px;color:var(--text-secondary);line-height:1.8">
          <div><strong>Session ID:</strong> ${d.id}</div>
          <div><strong>Created:</strong> ${new Date(d.created_at).toLocaleString()}</div>
          <div><strong>Duration:</strong> ${d.video_duration_sec ? d.video_duration_sec.toFixed(1) + 's' : '-'}</div>
          <div><strong>Total Frames:</strong> ${d.total_frames || '-'}</div>
          <div><strong>Resume Count:</strong> ${d.resume_count}</div>
          <div><strong>Has Subtitles:</strong> ${d.has_subtitles ? 'Yes' : 'No'}</div>
          <div><strong>Has Project Zip:</strong> ${d.has_project_zip ? 'Yes' : 'No'}</div>
        </div>
      </div>

      <div class="tab-content" id="tabPreview">
        <div class="preview-container">
          <iframe id="previewFrame" src="about:blank"></iframe>
          <div class="preview-controls">
            <button class="btn btn-ghost btn-sm" id="playBtn" onclick="togglePreviewPlay()">▶</button>
            <input type="range" class="frame-scrubber" id="frameScrubber" min="0" max="${d.total_frames || 100}" value="0" oninput="seekFrame(this.value)" />
            <span class="frame-label" id="frameLabel">0 / ${d.total_frames || '?'}</span>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="loadPreview('${d.id}')">Load Preview</button>
      </div>

      ${canResume ? `
      <div class="tab-content" id="tabResume">
        <div class="resume-section">
          <h3>Modify Video</h3>
          <div class="form-group">
            <label>Modification Instructions</label>
            <textarea id="resumePrompt" rows="6" placeholder="Describe what changes you want..."></textarea>
          </div>
          <button class="btn btn-primary" onclick="resumeSession('${d.id}')">Apply Changes</button>
        </div>
      </div>` : ''}
    </div>
  `;
}

// ─── SSE ───

function startSSE(sessionId) {
  if (eventSource) eventSource.close();
  eventSource = new EventSource(`${API}/sessions/${sessionId}/stream`);
  eventSource.addEventListener('status', (e) => {
    const detail = JSON.parse(e.data);
    if (detail.id === activeSessionId) {
      renderDetail(detail);
      fetchSessions(); // refresh list badges
    }
  });
  eventSource.addEventListener('done', () => {
    eventSource?.close();
    fetchSessions();
  });
  eventSource.addEventListener('error', () => {
    eventSource?.close();
  });
}

// ─── Actions ───

function showCreateModal() { document.getElementById('createModal').classList.remove('hidden'); }
function hideCreateModal() { document.getElementById('createModal').classList.add('hidden'); }

async function createSession() {
  const article = document.getElementById('articleInput').value.trim();
  if (!article) return alert('Please enter article content');
  const requirements = document.getElementById('requirementsInput').value.trim();

  try {
    const res = await fetch(`${API}/sessions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ article, requirements }),
    });
    const data = await res.json();
    hideCreateModal();
    document.getElementById('articleInput').value = '';
    document.getElementById('requirementsInput').value = '';
    await fetchSessions();
    selectSession(data.id);
  } catch (e) {
    alert('Failed to create session: ' + e.message);
  }
}

async function stopSession(id) {
  await fetch(`${API}/sessions/${id}/stop`, { method: 'POST' });
  await fetchSessions();
  if (id === activeSessionId) loadSessionDetail(id);
}

async function deleteSession(id) {
  if (!confirm('Delete this session and all its data?')) return;
  await fetch(`${API}/sessions/${id}`, { method: 'DELETE' });
  if (id === activeSessionId) {
    activeSessionId = null;
    document.getElementById('mainContent').innerHTML = '<div class="main-empty">Select a session or create a new one</div>';
  }
  await fetchSessions();
}

async function resumeSession(id) {
  const prompt = document.getElementById('resumePrompt')?.value?.trim();
  if (!prompt) return alert('Please enter modification instructions');

  try {
    await fetch(`${API}/sessions/${id}/resume`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });
    await fetchSessions();
    selectSession(id);
  } catch (e) {
    alert('Failed to resume: ' + e.message);
  }
}

function downloadVideo(id) {
  window.open(`${API}/sessions/${id}/video`, '_blank');
}

// ─── Preview ───

async function loadPreview(id) {
  try {
    const res = await fetch(`${API}/sessions/${id}/preview-url`);
    const data = await res.json();
    const iframe = document.getElementById('previewFrame');
    if (iframe) iframe.src = data.url;
  } catch (e) {
    alert('Preview not available: ' + e.message);
  }
}

function seekFrame(frame) {
  const iframe = document.getElementById('previewFrame');
  if (iframe?.contentWindow) {
    iframe.contentWindow.__CURRENT_FRAME__ = parseInt(frame);
  }
  const label = document.getElementById('frameLabel');
  if (label) label.textContent = `${frame} / ${document.getElementById('frameScrubber')?.max || '?'}`;
}

function togglePreviewPlay() {
  previewPlaying = !previewPlaying;
  const btn = document.getElementById('playBtn');
  if (btn) btn.textContent = previewPlaying ? '⏸' : '▶';

  if (previewPlaying) {
    const scrubber = document.getElementById('frameScrubber');
    const animate = () => {
      if (!previewPlaying) return;
      let frame = parseInt(scrubber.value) + 1;
      if (frame > parseInt(scrubber.max)) frame = 0;
      scrubber.value = frame;
      seekFrame(frame);
      previewRafId = requestAnimationFrame(animate);
    };
    // 30fps = ~33ms per frame
    const step = () => {
      if (!previewPlaying) return;
      let frame = parseInt(scrubber.value) + 1;
      if (frame > parseInt(scrubber.max)) { frame = 0; previewPlaying = false; btn.textContent = '▶'; return; }
      scrubber.value = frame;
      seekFrame(frame);
      setTimeout(step, 33);
    };
    step();
  }
}

// ─── Tabs ───

function switchTab(tabEl, contentId) {
  tabEl.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  tabEl.closest('.detail-body').querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(contentId)?.classList.add('active');
}

function showResumeForm() {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => {
    if (t.textContent === 'Resume') { t.click(); }
  });
}

// ─── Helpers ───

function formatStatus(s) {
  const map = {
    CREATED: 'Created',
    GENERATING_SCRIPT: 'Script',
    GENERATING_TTS: 'TTS',
    GENERATING_ANIMATION: 'Animation',
    RENDERING: 'Rendering',
    COMPLETED: 'Done',
    ERROR: 'Error',
    STOPPED: 'Stopped',
  };
  return map[s] || s;
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── Init ───

fetchSessions();
setInterval(fetchSessions, 5000);
</script>
</body>
</html>
